<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>פנייה למשרד התחבורה - רחוב אילפא</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            padding: 10px 15px 30px 15px;
            margin: 0;
        }
        .bsd {
            text-align: right;
            font-weight: bold;
            color: #555;
            margin-bottom: 10px;
            padding-right: 10px;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            color: #2c3e50;
        }
        p {
            font-size: 16px;
            color: #555;
            margin-bottom: 20px;
        }
        .privacy-note {
            font-size: 13px;
            color: #27ae60;
            background-color: #eafaf1;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            border: 1px solid #c8e6c9;
        }
        .form-group {
            margin-bottom: 15px;
            text-align: right;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
        }
        .btn {
            background-color: #3498db;
            color: white;
            padding: 15px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 10px;
            transition: background-color 0.3s;
            font-weight: bold;
        }
        .btn:hover {
            background-color: #2980b9;
        }
        .btn-secondary {
            background-color: #95a5a6;
        }
        .btn-secondary:hover {
            background-color: #7f8c8d;
        }
    </style>
</head>
<body>

<div class="bsd">בס"ד</div>

<div class="container">
    <h1>דורשים תחבורה ציבורית ברחוב אילפא!</h1>
    <p>שכנים יקרים, אנא מלאו את פרטיכם כדי שהתלונה תהיה רשמית ותחייב מענה. המערכת תכין עבורכם נוסח מוכן ואקראי.</p>
    
    <div class="privacy-note">
        🔒 <strong>חשוב לדעת:</strong> המידע שאתם מזינים כאן אינו נשמר בשום מקום ובשום מאגר! הוא משמש אך ורק ליצירת המייל בדפדפן ובתוכנת הדואר האישית שלכם.
    </div>
    
    <div class="form-group">
        <label for="userName">שם מלא:</label>
        <input type="text" id="userName" placeholder="לדוגמה: ישראל ישראלי">
    </div>
    
    <div class="form-group">
        <label for="userId">תעודת זהות:</label>
        <input type="text" id="userId" placeholder="הקלידו מספר ת.ז">
    </div>
    
    <div class="form-group">
        <label for="userAddress">כתובת מגורים:</label>
        <input type="text" id="userAddress" placeholder="לדוגמה: אילפא 12, בית שמש">
    </div>
    
    <div class="form-group">
        <label for="userPhone">מספר טלפון:</label>
        <input type="text" id="userPhone" placeholder="להתקשרות ממשרד התחבורה">
    </div>

    <button class="btn" onclick="processEmail('open')">1. לחץ לפתיחת המייל ושליחה</button>
    <button class="btn btn-secondary" onclick="processEmail('copy')">2. לחץ להעתקת הטקסט (אם המייל לא נפתח אוטומטית)</button>
</div>
