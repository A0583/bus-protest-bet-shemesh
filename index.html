<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>פנייה למשרד התחבורה - רחוב אילפא</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            padding: 10px 15px 30px 15px;
            margin: 0;
        }
        .bsd {
            text-align: right;
            font-weight: bold;
            color: #555;
            margin-bottom: 10px;
            padding-right: 10px;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            color: #2c3e50;
        }
        p {
            font-size: 16px;
            color: #555;
            margin-bottom: 20px;
        }
        .privacy-note {
            font-size: 13px;
            color: #27ae60;
            background-color: #eafaf1;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            border: 1px solid #c8e6c9;
        }
        .form-group {
            margin-bottom: 15px;
            text-align: right;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
        }
        .btn {
            background-color: #3498db;
            color: white;
            padding: 15px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 10px;
            transition: background-color 0.3s;
            font-weight: bold;
        }
        .btn:hover {
            background-color: #2980b9;
        }
        .btn-secondary {
            background-color: #95a5a6;
        }
        .btn-secondary:hover {
            background-color: #7f8c8d;
        }
    </style>
</head>
<body>

<div class="bsd">בס"ד</div>

<div class="container">
    <h1>דורשים תחבורה ציבורית ברחוב אילפא!</h1>
    <p>שכנים יקרים, אנא מלאו את פרטיכם כדי שהתלונה תהיה רשמית ותחייב מענה. המערכת תכין עבורכם נוסח מוכן ואקראי.</p>
    
    <div class="privacy-note">
        🔒 <strong>חשוב לדעת:</strong> המידע שאתם מזינים כאן אינו נשמר בשום מקום ובשום מאגר! הוא משמש אך ורק ליצירת המייל בדפדפן ובתוכנת הדואר האישית שלכם.
    </div>
    
    <div class="form-group">
        <label for="userName">שם מלא:</label>
        <input type="text" id="userName" placeholder="לדוגמה: ישראל ישראלי">
    </div>
    
    <div class="form-group">
        <label for="userId">תעודת זהות:</label>
        <input type="text" id="userId" placeholder="הקלידו מספר ת.ז">
    </div>
    
    <div class="form-group">
        <label for="userAddress">כתובת מגורים:</label>
        <input type="text" id="userAddress" placeholder="לדוגמה: אילפא 12, בית שמש">
    </div>
    
    <div class="form-group">
        <label for="userPhone">מספר טלפון:</label>
        <input type="text" id="userPhone" placeholder="להתקשרות ממשרד התחבורה">
    </div>

    <button class="btn" onclick="processEmail('open')">1. לחץ לפתיחת המייל ושליחה</button>
    <button class="btn btn-secondary" onclick="processEmail('copy')">2. לחץ להעתקת הטקסט (אם המייל לא נפתח אוטומטית)</button>
</div>

<script>
    function generateContent() {
        const name = document.getElementById('userName').value.trim();
        const id = document.getElementById('userId').value.trim();
        const address = document.getElementById('userAddress').value.trim();
        const phone = document.getElementById('userPhone').value.trim();

        if (!name || !id || !address || !phone) {
            alert("אנא מלאו את כל הפרטים האישיים כדי שנוכל לייצר עבורכם תלונה רשמית.");
            return null;
        }

        const subjects = [
            "בקשה דחופה להפעלת תחבורה ציבורית ברחוב אילפא, בית שמש",
            "דרישה למתן שירותי תחבורה ציבורית - רחוב אילפא (בית שמש)",
            "תלונה: היעדר קווי אוטובוס וניתוק תחבורתי ברחוב אילפא",
            "הפרת הנחיות משרד התחבורה - חוסר בשירות ברחוב אילפא, בית שמש",
            "פניית תושבים: בקשה לסיור שטח והפעלת קו הזנה ברחוב אילפא"
        ];

        const templates = [
            "לכבוד משרד התחבורה.\n\nאני מתגורר/ת ברחוב אילפא, בית שמש. בקצה הרחוב קיימת תשתית מוכנה לתחבורה ציבורית, כולל סובה תקנית לסיבוב ומיקום לתחנות. חרף זאת, המשרד מסרב לאשר כניסת קווים. מרחק ההליכה לתחנה הקרובה חורג מהתקן המוגדר ב'הנחיות לתכנון תחבורה ציבורית' שלכם (עמ' 51). אנו דורשים אישור לכניסת קווי הזנה פנימיים באופן מיידי.",
            
            "לכבוד פניות הציבור, משרד התחבורה.\n\nברחוב אילפא בבית שמש ישנה תשתית מוכנה ומאושרת להסתובבות אוטובוסים, אך הרחוב מנותק מתחבורה. המצב הנוכחי מפר את הנחיות משרד התחבורה לגבי מרחקי הליכה סבירים לתחנה. הצעידה היומיומית לתחנה המרוחקת יחד עם הילדים, במיוחד בעליות של בית שמש, היא קשה מנשוא. נדרש סיור שטח של מתכנן המחוז כדי לתקן את המעוות.",
            
            "לכבוד הרשות הארצית לתחבורה ציבורית.\n\nאני פונה אליכם בדרישה להפעלת קו אוטובוס ברחוב אילפא (ללא מוצא) בבית שמש. בקצה הרחוב ישנה 'סובה' שאף יועדה בעבר לתחנות ולשילוט. מניעת השירות מאיתנו היא בגדר פיל לבן של תשתית שלא מנוצלת, ואפליה לעומת רחובות דומים בערים אחרות שמקבלים שירות. אבקש לאשר הפעלת מיניבוסים ברחוב, ולו רק בשעות השיא.",
            
            "לכבוד משרד התחבורה.\n\nאנו תושבי רחוב אילפא בבית שמש. ברחוב שלנו הושקעו כספי ציבור בבניית תשתית ורחבת הסתובבות (סובה) לתחבורה ציבורית, אך כעת היא עומדת כאבן שאין לה הופכין. מניעת אישור כניסת אוטובוסים לרחוב מאלצת אותנו ואת ילדינו לצעוד מרחק רב בניגוד לתקן. אבקש לאשר הפעלת קווי תחבורה ציבורית ברחוב, גם אם במתכונת מצומצמת.",
            
            "לפניות הציבור, משרד התחבורה.\n\nפנייה זו מגיעה מתושב/ת רחוב אילפא בבית שמש. למרות שהרחוב הוא ללא מוצא, נבנתה בו מראש תשתית מלאה ובטיחותית להסתובבות אוטובוסים. הניתוק שלנו מתחבורה ציבורית מפר את 'הנחיות לתכנון תחבורה ציבורית' המחייבות מרחק הליכה סביר (עמ' 51). אנו דורשים שוויון ותחבורה נגישה כפי שקיים ברחובות דומים. אודה לטיפולכם המהיר.",
            
            "לכבוד הרשות הארצית לתחבורה ציבורית.\n\nשלום רב. רחוב אילפא בבית שמש מנותק לחלוטין משירותי אוטובוסים למרות שקיימת בקצהו כיכר המיועדת להסתובבות. אנו נאלצים ללכת מרחקים שחורגים מהמותר בהנחיות המשרד. אנו דורשים לתקן את המעוות ולאפשר כניסת קווי מיניבוס/מידיבוס או קווי הזנה לרחוב שלנו בהקדם. מצפים להתייחסותכם המקצועית ולמענה ענייני."
        ];

        const randomSubjectIndex = Math.floor(Math.random() * subjects.length);
        const randomTemplateIndex = Math.floor(Math.random() * templates.length);
        
        const selectedSubject = subjects[randomSubjectIndex];
        const selectedTemplate = templates[randomTemplateIndex];

        const personalSignature = "\n\nבברכה,\n" + name + "\nת.ז: " + id + "\nכתובת: " + address + "\nטלפון: " + phone;
        
        return {
            email: "pniotcrm@mot.gov.il",
            subject: selectedSubject,
            body: selectedTemplate + personalSignature
        };
    }

    function processEmail(action) {
        const content = generateContent();
        if (!content) return; 

        if (action === 'open') {
            const mailtoLink = "mailto:" + content.email + 
                               "?subject=" + encodeURIComponent(content.subject) + 
                               "&body=" + encodeURIComponent(content.body);
            window.location.href = mailtoLink;
        } else if (action === 'copy') {
            const fullTextToCopy = "נמען: " + content.email + "\n" +
                                   "נושא: " + content.subject + "\n\n" + 
                                   "--- גוף ההודעה להדבקה ---\n\n" + 
                                   content.body;
            
            // מנגנון העתקה חדש, עמיד ויציב יותר שעובד בכל הדפדפנים
            var textArea = document.createElement("textarea");
            textArea.value = fullTextToCopy;
            
            // הפיכת תיבת הטקסט לנסתרת שלא תפריע לעיצוב
            textArea.style.position = "fixed";
            textArea.style.top = "0";
            textArea.style.left = "0";
            textArea.style.opacity = "0";
            
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();

            try {
                var successful = document.execCommand('copy');
                if (successful) {
                    alert("הטקסט, כולל כתובת הנמען והנושא, הועתק בהצלחה! תוכלו להדביק אותו כעת בתיבת המייל שלכם (למשל ב-Gmail).");
                } else {
                    alert("אירעה שגיאה בהעתקה, אנא נסו שוב.");
                }
            } catch (err) {
                alert("אירעה שגיאה בהעתקה. המכשיר חוסם פעולה זו.");
            }

            document.body.removeChild(textArea);
        }
    }
</script>

</body>
</html>
